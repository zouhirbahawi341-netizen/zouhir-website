<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زهير - الملف الشخصي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000; /* خلفية سوداء */
            color: #fff;
            overflow: hidden; /* لمنع ظهور شريط التمرير أثناء الحركة */
        }

        /* حاوية الخلفية المتحركة */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* لجعلها خلف المحتوى */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* السيارة الرياضية السوداء */
        .car {
            width: 400px; /* حجم مناسب للسيارة */
            height: auto;
            position: absolute;
            animation: rotateCar 15s linear infinite; /* حركة دورانية */
        }

        /* الهالات الضوئية الزرقاء */
        .glow-ring {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            border: 2px solid rgba(0, 150, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 150, 255, 0.5);
            animation: pulsateGlow 4s ease-in-out infinite;
        }

        /* تعريف حركة الدوران للسيارة */
        @keyframes rotateCar {
            from { transform: rotate(0deg) translateX(300px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(300px) rotate(-360deg); }
        }

        /* تعريف حركة النبض للهالات */
        @keyframes pulsateGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* تنسيق حاوية المحتوى */
        .hero {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 1; /* فوق الخلفية المتحركة */
        }

        .profile-container {
            background: rgba(255, 255, 255, 0.05); /* زجاجي شبه شفاف */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .avatar-box {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00ffff; /* إطار أزرق سماوي */
            box-shadow: 0 0 15px #00ffff;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
        }

        .bio {
            color: #bbb;
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ألوان الأزرار */
        .instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .facebook {
            background-color: #1877F2;
        }

        .steam {
            background: linear-gradient(90deg, #002244 0%, #0077b6 100%);
        }

        .social-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            filter: brightness(1.1);
        }

        .spotify-container {
            margin-top: 25px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="glow-ring"></div> <img src="path/to/your/black_car.png" alt="سيارة سوداء متحركة" class="car">
    </div>

    <div class="hero">
        <div class="profile-container">
            <div class="avatar-box">
                <img src="path/to/your/profile_picture.jpg" alt="صورة زهير">
            </div>

            <h1>زهير</h1>
            <p class="bio">مرحباً بكم في موقعي الشخصي | أهلاً وسهلاً بكم</p>

            <div class="links-container">
                <a href="#" class="social-link instagram" target="_blank">
                    <i class="fab fa-instagram"></i> إنستغرام
                </a>
                <a href="#" class="social-link facebook" target="_blank">
                    <i class="fab fa-facebook-f"></i> فيسبوك
                </a>
                <a href="#" class="social-link steam" target="_blank">
                    <i class="fab fa-steam"></i> ستيم
                </a>
            </div>

            <div class="spotify-container">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/6U455Xw656v5oDscOf49fD?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

        </div>
    </div>

</body>
</html>
